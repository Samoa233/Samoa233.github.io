<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samoa-HeroX WebSite Test</title>
    <style>
    /* 1. 直接使用本地真正的 .woff2 字体 */
    @font-face {
        font-family: 'HarmonyOS Sans';
        src: url('HarmonyOS_Sans_Regular.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
    }
    @font-face {
        font-family: 'HarmonyOS Sans';
        src: url('HarmonyOS_Sans_Bold.woff2') format('woff2');
        font-weight: bold;
        font-style: normal;
    }

    /* 2. 基础重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'HarmonyOS Sans', sans-serif; 
        background-color: #ffffff;
        padding: 60px 80px;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    /* 下面的 header, main, footer 布局代码原封不动保留即可 */
    body {
        font-family: 'HarmonyOS Sans', sans-serif; 
        background-color: #ffffff;
        padding: 60px 80px;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* 4. 顶部样式 */
    header h1 { font-size: 4rem; font-weight: bold; color: #000; }
    header hr {
        border: none;
        border-top: 1px solid #dcdcdc;
        margin: 20px 0 40px 0;
        width: 100%;
    }

    /* 5. 中间布局 */
    main {
        flex: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
 .text-content {
        font-size: 1.8rem;
        color: #000;
        display: flex;           /* 开启弹性盒子 */
        flex-direction: column;  /* 【关键】强制图标在上、文字在下 */
        align-items: flex-start; /* 保持左对齐 */
    }
    
    .text-content span { font-weight: bold; color: #333; }
        /* 新加的图片样式，确保图片大小适中且不变形 */
    .main-image {
        max-width: 45%;       /* 限制宽度最多占屏幕右侧的 45% */
        max-height: 60vh;     /* 限制高度最多占屏幕高度的 60% */
        width: auto;
        height: auto;
        object-fit: contain;  /* 确保图片不会被拉伸变形 */
        flex-shrink: 0;       /* 防止被压缩 */
    }

    /* 6. 底部页脚 */
    footer {
        margin-top: auto;
        font-size: 1rem;
        color: #666;
        letter-spacing: 0.5px;
    }
    
    /* ========================================= */
/* 👇 针对手机屏幕（宽度小于 600px 时生效） */
/* ========================================= */
@media screen and (max-width: 600px) {
    
    /* 1. 手机端四周留白减少 */
    body {
        padding: 20px 20px; 
    }

    /* 2. 手机端标题缩小（4rem 在手机上太大了） */
    header h1 {
        font-size: 2.8rem;
    }

    /* 3. 主力布局改成“上下排列”并居中 */
    main {
        flex-direction: column; /* 强制变成上下排列 */
        justify-content: center;
        gap: 40px; /* 文字和图片之间留点空隙 */
    }

    /* 4. 手机端文字缩小并居中 */
    .text-content {
        font-size: 1.3rem;
        text-align: center; /* 让文字居中，显得对称 */
        line-height: 1.5;   /* 增加行高，避免换行后字挤在一起 */
    }

    /* 5. 手机端图片变大并居中 */
    .main-image {
        max-width: 70%;     /* 让图片变宽，占屏幕宽度的70% */
        max-height: none;   /* 取消高度限制 */
        margin: 0 auto;     /* 让图片水平居中 */
    }

        /* 浏览器图标样式 */
        /* 替换为这个强限制的版本 */
        /* 浏览器图标样式 */
    .browser-icon {
        display: block;
        margin: 0 auto 15px auto; /* 居中对齐，底部留空隙 */
        flex-shrink: 0;
    }
    }

    /* ========================================= */
    /* 👇 针对手机屏幕（宽度小于 600px 时生效） */
    /* ========================================= */
    @media screen and (max-width: 600px) {
        /* 手机端四周留白减少 */
        body { padding: 20px 20px; }
        
        /* 手机端标题缩小 */
        header h1 { font-size: 2.8rem; }
        
        /* 主力布局改成“上下排列” */
        main {
            flex-direction: column;
            justify-content: center;
            gap: 40px;
        }
        
        /* 手机端文字缩小、居中 */
        .text-content {
            font-size: 1.3rem;
            text-align: center;
            line-height: 1.5;
        }
        
        /* 手机端图片变大居中 */
        .main-image {
            max-width: 70%;
            max-height: none;
            margin: 0 auto;
        }

            /* 手机端浏览器图标尺寸重锁 */
    .browser-icon {
        margin: 0 auto 10px auto;
        width: 45px !important;
        max-width: 45px !important;
        height: 45px !important;
        max-height: 45px !important;
        object-fit: contain !important;
    }
}

</style>

</head>
<body>

    <header>
        <h1>Hello World!</h1>
        <hr>
    </header>

    <main>
       <div class="text-content">
    <!-- 这里是留给 SVG 图标的位置 -->
    <div id="browser-icon-container"></div>
    
    <p>现在你正在使用 <span id="browser-info">加载内核版本中...</span> 访问此网站</p>
</div>
        
        <img src="test.webp" alt="测试图片" class="main-image" loading="lazy">
    </main>

    <footer>
        Samoa-HeroX WebSite Test
    </footer>

        <script>
    function detectBrowserAndShowIcon() {
        const ua = navigator.userAgent;
        let browserName = "未知浏览器";

        // 1. 检测浏览器名称（注意：Edge 的检测必须要在 Chrome 的前面）
        if (ua.indexOf("Firefox") > -1) browserName = "Firefox";
        else if (ua.indexOf("SamsungBrowser") > -1) browserName = "Samsung Internet";
        else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) browserName = "Opera";
        else if (ua.indexOf("Trident") > -1) browserName = "Internet Explorer";
        else if (ua.indexOf("Edg") > -1) browserName = "Microsoft Edge"; // 优先识别 Edge
        else if (ua.indexOf("Chrome") > -1) browserName = "Chrome";
        else if (ua.indexOf("Safari") > -1) browserName = "Safari";

        // 2. 将名称映射到你根目录的 SVG 文件名
        const iconMap = {
            "Chrome": "chrome.svg",
            "Firefox": "firefox.svg",
            "Microsoft Edge": "microsoft-edge.svg",
            "Safari": "safari.svg",
            "Internet Explorer": "internet-explorer.svg",
            "Opera": "opera.svg",
            "Samsung Internet": "samsung-internet.svg"
        };

        // 3. 更新页面上的文字
        document.getElementById('browser-info').innerText = browserName;

        // 4. 动态把 SVG 图片插入到文字上方
        const iconContainer = document.getElementById('browser-icon-container');
        iconContainer.innerHTML = ''; // 先清空以防万一

        const iconFile = iconMap[browserName];
        if (iconFile) {
            const img = document.createElement('img');
            img.src = iconFile;
            img.alt = browserName + " icon";
            img.className = "browser-icon";

            // 🔥 强制锁定尺寸的强力内联锁
            img.style.width = "60px";
            img.style.maxWidth = "60px";
            img.style.height = "60px";
            img.style.maxHeight = "60px";
            img.style.objectFit = "contain";
            
            iconContainer.appendChild(img);
        }
    }

    // 执行函数
        detectBrowserAndShowIcon();
</script>
</body>
</html>
